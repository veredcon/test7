apiVersion: asset.sap/v1
kind: Asset

metadata:
  id: invoice-approval-monitor-agent
  name: Invoice Approval Monitor Agent
  version: "1.0.0"

type: agent

container:
  buildPath: .
  port: 5000

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
